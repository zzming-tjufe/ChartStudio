chart:
  title: "变量相关性散点图"
  subtitle: ""

figure:
  width: 8.0
  height: 7.0

export:
  dpi: 200
  transparent: false

font:
  zh_name: "微软雅黑"
  zh_path: ""
  en_name: "Times New Roman"
  en_path: ""
  num_name: "Times New Roman"
  num_path: ""
  family: "sans-serif"
  file_path: ""
  title_size: 16
  label_size: 12
  tick_size: 10
  legend_size: 10

axes:
  x_label: "X 变量"
  y_label: "Y 变量"
  grid: true
  grid_alpha: 0.25
  spine_visible: true

legend:
  show: true
  loc: "best"
  frameon: true

scatter_style:
  size: 60.0
  alpha: 0.75
  edge_width: 0.8

series:
  overall:
    color: "#5E35B1"
  group_a:
    color: "#5E35B1"
    label: "组 A"
  group_b:
    color: "#00897B"
    label: "组 B"

data:
  group_a:
    x: [1.2, 2.1, 2.8, 3.5, 4.0, 4.6]
    y: [2.0, 2.5, 3.1, 3.8, 4.2, 4.9]
  group_b:
    x: [1.0, 1.8, 2.5, 3.2, 3.9, 4.5]
    y: [1.5, 2.0, 2.4, 3.0, 3.5, 4.0]
