chart:
  title: "实验结果对比报告"
  subtitle: "2024 年度数据统计"

figure:
  width: 12.0
  height: 7.0

export:
  dpi: 300
  transparent: false

font:
  zh_name: "微软雅黑"
  zh_path: ""
  en_name: "Times New Roman"
  en_path: ""
  num_name: "Times New Roman"
  num_path: ""
  family: "sans-serif"
  file_path: ""
  title_size: 18
  label_size: 13
  tick_size: 11
  legend_size: 11

axes:
  x_label: "时间点"
  y_label: "测量值"
  grid: true
  grid_alpha: 0.25
  spine_visible: false

legend:
  show: true
  loc: "upper left"
  frameon: true
  fontsize: 11

line_style:
  width: 2.5
  marker_size: 7.0
  marker: "s"
  marker_edge_width: 1.2
  alpha: 0.95

series:
  overall:
    color: "#0D47A1"
  method_a:
    color: "#1565C0"
    label: "方法 A"
    label_offset: [0, 0.3]
  method_b:
    color: "#C62828"
    label: "方法 B"
    label_offset: [0, -0.3]
  baseline:
    color: "#616161"
    label: "基线"
    label_offset: [0, 0]

custom_text:
  title_xy: [0.5, 1.04]
  legend_xy: [0.02, 0.98]

data_labels:
  show: false
  fontsize: 9

data:
  x: [1, 2, 3, 4, 5, 6]
  method_a: [3.2, 3.8, 4.1, 4.5, 4.8, 5.1]
  method_b: [2.8, 3.1, 3.5, 3.9, 4.2, 4.6]
  baseline: [3.0, 3.0, 3.0, 3.0, 3.0, 3.0]
